# SofaMsg / SilentBell — CI Pipeline
#
# Three-stage pipeline:
#   1. test        — unit tests, clippy lints, formatting check
#   2. build-android — cross-compile FFI crate for Android targets
#   3. build-apk    — assemble debug APK with native libraries

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ── Job 1: Test ──────────────────────────────────────────────────

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy lint (warnings are errors)
        run: cargo clippy --workspace -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

  # ── Job 2: Build Android native libraries ────────────────────

  build-android:
    name: Build Android .so
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Android NDK via sdkmanager
        run: sdkmanager "ndk;26.1.10909125"

      - name: Set ANDROID_NDK_HOME
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-android-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-${{ matrix.target }}-

      - name: Cross-compile FFI crate
        run: |
          cargo ndk \
            -t ${{ matrix.abi }} \
            build --release -p silentbell_ffi

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs-${{ matrix.abi }}
          path: target/${{ matrix.target }}/release/libsilentbell_ffi.so
          retention-days: 7

  # ── Job 3: Assemble Android APK ──────────────────────────────

  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: build-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Download arm64-v8a .so
        uses: actions/download-artifact@v4
        with:
          name: jniLibs-arm64-v8a
          path: android/app/src/main/jniLibs/arm64-v8a/

      - name: Download armeabi-v7a .so
        uses: actions/download-artifact@v4
        with:
          name: jniLibs-armeabi-v7a
          path: android/app/src/main/jniLibs/armeabi-v7a/

      - name: Download x86_64 .so
        uses: actions/download-artifact@v4
        with:
          name: jniLibs-x86_64
          path: android/app/src/main/jniLibs/x86_64/

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sofamsg-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
