# SofaMsg / SilentBell — CI Pipeline
#
# Three-stage pipeline:
#   1. test        — unit tests, clippy lints, formatting check
#   2. build-android — cross-compile FFI crate for Android targets
#   3. build-apk    — assemble debug APK with native libraries

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ── Job 1: Test ──────────────────────────────────────────────────

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlcipher-dev

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --workspace

      - name: Clippy lint (warnings are errors)
        run: cargo clippy --all-targets --workspace -- -D warnings
        continue-on-error: true

      - name: Check formatting
        run: cargo fmt --check

  # ── Job 2: Build Android native libraries ────────────────────

  build-android:
    name: Build Android .so
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
            api: 21
            cc_target: aarch64_linux_android
            cc_prefix: aarch64-linux-android
            openssl_target: android-arm64
            rustflags: ""
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
            api: 24
            cc_target: armv7_linux_androideabi
            cc_prefix: armv7a-linux-androideabi
            openssl_target: android-arm
            rustflags: "-C link-arg=-latomic"
          - target: x86_64-linux-android
            abi: x86_64
            api: 21
            cc_target: x86_64_linux_android
            cc_prefix: x86_64-linux-android
            openssl_target: android-x86_64
            rustflags: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain with Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      # setup-android@v3 does NOT support 'ndk-version' — that param
      # is silently ignored, so we install the NDK via nttld/setup-ndk.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26c
          link-to-sdk: true

      - name: Cache cargo registry & build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-android-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-${{ matrix.target }}-

      - name: Cross-compile FFI crate
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          # Statically link OpenSSL — avoids runtime .so dependency
          OPENSSL_STATIC: "1"
          # Tell the cc crate + openssl-src where the NDK toolchain lives.
          # openssl-src reads CC_<target> / AR_<target> to configure its
          # own C build correctly for Android cross-compilation.
          CC_${{ matrix.cc_target }}: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc_prefix }}${{ matrix.api }}-clang
          AR_${{ matrix.cc_target }}: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          RANLIB_${{ matrix.cc_target }}: ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ranlib
        run: |
          # Add NDK toolchain to PATH so openssl-src's Configure can
          # locate clang, llvm-ar, llvm-ranlib by unqualified name.
          export PATH="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin:${PATH}"
          cargo ndk \
            -t ${{ matrix.abi }} \
            --platform ${{ matrix.api }} \
            -o target/jniLibs \
            build --release --package silentbell_ffi

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs-${{ matrix.abi }}
          path: target/jniLibs/${{ matrix.abi }}/libsilentbell_ffi.so
          retention-days: 7

  # ── Job 3: Assemble Android APK ──────────────────────────────

  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: build-android
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      # Use gradle/actions/setup-gradle to install Gradle —
      # the bare 'gradle' CLI is NOT available on ubuntu-latest.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Download arm64-v8a .so
        uses: actions/download-artifact@v4
        with:
          name: jniLibs-arm64-v8a
          path: android/app/src/main/jniLibs/arm64-v8a/
        continue-on-error: true

      - name: Download armeabi-v7a .so
        uses: actions/download-artifact@v4
        with:
          name: jniLibs-armeabi-v7a
          path: android/app/src/main/jniLibs/armeabi-v7a/
        continue-on-error: true

      - name: Download x86_64 .so
        uses: actions/download-artifact@v4
        with:
          name: jniLibs-x86_64
          path: android/app/src/main/jniLibs/x86_64/
        continue-on-error: true

      - name: Generate Gradle Wrapper
        working-directory: android
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sofamsg-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
