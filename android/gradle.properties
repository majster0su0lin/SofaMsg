# SofaMsg — Gradle properties
#
# Standard Android project properties for Jetpack Compose with
# the Kotlin DSL build system.

# Use AndroidX artifacts instead of legacy support library
android.useAndroidX=true

# Enable Jetpack Compose (also requires compose compiler plugin)
android.defaults.buildfeatures.compose=true

# Non-transitive R classes — faster builds, no accidental resource leaks
android.nonTransitiveRClass=true

# Parallel builds
org.gradle.parallel=true

# Daemon for faster subsequent builds
org.gradle.daemon=true

# JVM args for the Gradle daemon
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Kotlin code style (official = Android-recommended)
kotlin.code.style=official
